<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="assets/js/index.js" defer></script>
    <title>Responsive design practice</title>
</head>
<body>
    <main class="page">
        <h1>Random Dog Gallery</h1>

        <div class="controls">
            <button id="add-animal-button" type="button">Add random dog</button>

            <form id="animal-quantity-form" class="quantity-form">
                <input type="number" id="dogs-quantity-input" placeholder="How many?" min="1" max="20">
                <button type="submit">Add dogs</button>
            </form>
        </div>

        <section id="dogs-container" class="dogs-container"></section>
    </main>
</body>
</html>
