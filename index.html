<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="assets/js/index.js" defer></script>
    <title>Responsive design practice</title>
</head>
<body>
    <main class="page">
        <h1>Random Dog Gallery</h1>
        <button id="add-animal-button" type="button">Add random dog</button>
        <section id="dogs-container" class="dogs-container"></section>
    </main>
    <form id="animal-quantity-form">
        <input type="number" id="dogs-quantity-input" placeholder="Enter dogs quantity" min="1" max="10">
        <button type="submit">Add animals</button>
    </form>
</body>
</html>
